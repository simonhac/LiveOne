# LiveOne collector hub (musher) — permanent Fly.io WireGuard hub.
#
# The sheephouse UDM (Daylesford farm, behind Starlink CGNAT) dials in as a WireGuard *client*;
# this hub routes the LAN-only DeepSea DSE7410 (10.0.1.244:502) over the tunnel and runs the
# musher collector, which POSTs readings to the gusher (/api/gush).
#
# Cutover/runbook + on-site (UDM/firewall) detail: the sheephouse network knowledgebase
# (hac-admin/…/farm/infrastructure/network/_network.md). Secrets are Fly secrets, not here:
#   WG_PRIVKEY   hub WireGuard private key   (reused from liveone-flyhub-probe → hub pubkey unchanged)
#   PEER_PUBKEY  sheephouse UDM WG public key
#   MUSHER_API_KEY  gusher push credential (system 14 = deepsea/sheephouse)
app = "liveone-flyhub"
primary_region = "syd"

[build]

[env]
  # boundary-aligned cadence: every 5 min idle, every 1 min while the generator is running
  COLLECTOR_INTERVAL_SEC = "300"
  COLLECTOR_ACTIVE_INTERVAL_SEC = "60"
  DEEPSEA_HOST = "10.0.1.244"
  GUSH_ENDPOINT = "https://www.liveone.energy/api/gush"
  MUSHER_SITE_ID = "sheephouse"

# WireGuard inbound on the dedicated IPv4. Always-on hub (no autostop) so the UDM stays handshook.
[[services]]
  protocol = "udp"
  internal_port = 51820
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 51820

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
