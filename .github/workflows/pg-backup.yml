name: PG off-site backup → R2

# Daily provider-independent backup of the PlanetScale Sydney Postgres branch to Cloudflare R2.
# Complements PlanetScale PITR (which lives on PlanetScale infra). See
# docs/turso-pg-migration.md → "Off-site backup — provider-independent DR".

on:
  schedule:
    - cron: "17 16 * * *" # 16:17 UTC daily ≈ 02:17 Sydney; off the top-of-hour cron rush
  workflow_dispatch: {} # allow manual runs

concurrency:
  group: pg-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pg_dump 17, rclone, age
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17 rclone age

      - name: Dump + upload to R2
        env:
          PG_BACKUP_DATABASE_URL: ${{ secrets.PG_BACKUP_DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AGE_RECIPIENT: ${{ vars.AGE_RECIPIENT }} # optional; empty = no client-side encryption
          ALERT_WEBHOOK_URL: ${{ secrets.OBSERVATIONS_ALERT_WEBHOOK_URL }}
        run: bash scripts/utils/backup-pg-to-r2.sh
