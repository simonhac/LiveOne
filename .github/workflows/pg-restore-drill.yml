name: liveone PG restore drill

# Weekly proof that the latest off-site R2 dump actually restores — the "0 restore errors" leg of
# 3-2-1-1-0 — via the reusable the-gitfather workflow. Restores the newest dump into a throwaway
# postgres:17 service and asserts point_readings is within tolerance of live (see pg-backup/liveone.env).

on:
  schedule:
    - cron: "37 17 * * 1" # Mondays 17:37 UTC ≈ Tue 03:37 Sydney
  workflow_dispatch: {}

concurrency:
  group: pg-restore-drill
  cancel-in-progress: false

jobs:
  drill:
    uses: simonhac/the-gitfather/.github/workflows/pg-restore-drill.yml@main
    with:
      profile: pg-backup/liveone.env
      r2_bucket: ${{ vars.R2_BUCKET }}
      slack_channel: ${{ vars.SLACK_CHANNEL }}
    secrets:
      PG_BACKUP_DATABASE_URL: ${{ secrets.PG_BACKUP_DATABASE_URL }}  # read-only — the live row-count reference
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}              # optional
      ALERT_WEBHOOK_URL: ${{ secrets.OBSERVATIONS_ALERT_WEBHOOK_URL }}
