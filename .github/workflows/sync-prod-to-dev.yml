name: Sync prod → liveone-dev

# Incremental top-up of the shared liveone-dev database from prod (Sydney), every 2h.
# Reads prod with a SELECT-only role; writes only to liveone-dev. Between these runs
# (and the occasional manual R2 full restore) liveone-dev tracks prod closely enough
# for local dev + Vercel preview to share it. See scripts/utils/sync-prod-to-dev-db.ts
# scripts/utils/rebuild-dev-kv-from-db.ts, and recompute-dev-runs-from-db.ts (the legs), or
# docs/sync-prod-to-dev.md.

on:
  schedule:
    - cron: "20 */2 * * *" # every 2h at :20, off the top-of-hour cron rush
  workflow_dispatch: {} # manual "bring up to date" button

concurrency:
  group: sync-prod-to-dev
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Post-fix the sync runs in a couple of minutes; 15 caps wasted Actions minutes if a leg wedges,
    # while leaving generous headroom over the ~5-min target. A timeout shows as `cancelled` and fires
    # the `Alert on timeout` step below (timeouts used to be silent — no `if: failure()`).
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read # gh run list — read the previous run's conclusion for the recovery ping
    steps:
      - uses: actions/checkout@v4

      # No psql needed: the DB sync now streams over node-postgres (pure JS) COPY connections, and the
      # other legs are all tsx/pg. (Was: install postgresql-client-17 to match the 17.10 server.)
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Stamp the start of the data-sync work (excludes CI setup: checkout/pg-client/npm ci) so the
      # reporting step below can measure "how long the sync took" against the 5-min target.
      - name: Mark sync start
        run: echo "SYNC_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Sync prod → liveone-dev
        env:
          PG_PROD_RO_DATABASE_URL: ${{ secrets.PG_PROD_RO_DATABASE_URL }}
          LIVEONE_DEV_DATABASE_URL: ${{ secrets.LIVEONE_DEV_DATABASE_URL }}
          PLANETSCALE_PROD_BRANCH_ID: ${{ secrets.PLANETSCALE_PROD_BRANCH_ID }}
        run: npm run db:sync-dev-db

      # Crons are off in dev/preview, so the run-period recompute never runs organically and
      # device_run_periods isn't copied by the sync (composite PK can't mirror; recomputed rows
      # shift). Rebuild the runs from the readings we just topped up, so the runs panel matches
      # the chart in dev. Writes only device_run_periods, only to liveone-dev.
      - name: Recompute dev run periods from liveone-dev
        env:
          PLANETSCALE_DATABASE_URL: ${{ secrets.LIVEONE_DEV_DATABASE_URL }}
          PLANETSCALE_PROD_BRANCH_ID: ${{ secrets.PLANETSCALE_PROD_BRANCH_ID }}
        run: npm run db:recompute-dev-runs

      # Crons are off in dev/preview, so nothing fills the dev: KV namespace organically.
      # Rebuild it from the DB we just topped up, so preview "live" cards stay consistent with
      # the synced data. No prod KV access needed — derived purely from liveone-dev.
      # getEnvironment() resolves to "dev" here (no VERCEL_ENV), so writes land in dev:.
      - name: Rebuild dev KV from liveone-dev
        env:
          PLANETSCALE_DATABASE_URL: ${{ secrets.LIVEONE_DEV_DATABASE_URL }}
          PLANETSCALE_PROD_BRANCH_ID: ${{ secrets.PLANETSCALE_PROD_BRANCH_ID }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: npm run db:rebuild-dev-kv

      # Re-own LAST: the DB / KV / run-period refresh is the important work, so a reown bug shouldn't
      # block it — but it still FAILS the job (loud red + Slack alert), never continue-on-error.
      # Dev/preview use a SEPARATE Clerk instance, so your dev login has a different clerk_user_id than
      # prod; the sync copies prod-owned rows, so re-own them to your dev id (DEV_OWNER_REMAP =
      # "prodId:devId") so your dev login sees the same areas/dashboards as prod. No-op (exit 0) if the
      # secret is unset. Runs before the reporting step, so its time still counts toward the target.
      - name: Re-own dev data to the dev login
        env:
          LIVEONE_DEV_DATABASE_URL: ${{ secrets.LIVEONE_DEV_DATABASE_URL }}
          DEV_OWNER_REMAP: ${{ secrets.DEV_OWNER_REMAP }}
          PLANETSCALE_PROD_BRANCH_ID: ${{ secrets.PLANETSCALE_PROD_BRANCH_ID }}
        run: npm run db:reown-dev

      # On a clean run: (1) warn to Slack if the sync blew the 5-min target, outputting the elapsed time;
      # (2) if the previous run was unhealthy (failed or timed out), post a one-shot "recovered" ping.
      - name: Report duration + recovery
        if: success()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.OBSERVATIONS_ALERT_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [ -n "${ALERT_WEBHOOK_URL:-}" ] || exit 0
          ELAPSED=$(( $(date +%s) - SYNC_START ))
          MIN=$(( ELAPSED / 60 )); SEC=$(( ELAPSED % 60 ))
          post() {
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "{\"text\":\"$1\"}" "$ALERT_WEBHOOK_URL" || true
          }
          echo "sync took ${MIN}m ${SEC}s (${ELAPSED}s)"
          # (1) Over the 5-minute (300s) target → warn, with the time.
          if [ "$ELAPSED" -gt 300 ]; then
            post "⚠️ sync-prod-to-dev took ${MIN}m ${SEC}s — over the 5-min target. See GitHub Actions."
          fi
          # (2) First success after an unhealthy run. This run is still in_progress, so the latest
          # *completed* run is the previous one; announce recovery if it failed or was cancelled (timeout).
          PREV=$(gh run list --workflow=sync-prod-to-dev.yml --branch "${GITHUB_REF_NAME}" \
                   --status completed --limit 1 --json conclusion --jq '.[0].conclusion // ""' || echo "")
          if [ "$PREV" = "failure" ] || [ "$PREV" = "cancelled" ]; then
            post "✅ sync-prod-to-dev recovered — liveone-dev is fresh again (latest sync took ${MIN}m ${SEC}s)."
          fi

      - name: Alert on failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.OBSERVATIONS_ALERT_WEBHOOK_URL }}
        run: |
          [ -n "${ALERT_WEBHOOK_URL:-}" ] || exit 0
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d '{"text":"🔴 sync-prod-to-dev FAILED — liveone-dev may be stale. See GitHub Actions."}' \
            "$ALERT_WEBHOOK_URL" || true

      # A timeout (timeout-minutes exceeded) surfaces as `cancelled`, which the failure alert misses —
      # and a timeout is by definition over the 5-min target. Warn so stale dev is never silent.
      - name: Alert on timeout
        if: cancelled()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.OBSERVATIONS_ALERT_WEBHOOK_URL }}
        run: |
          [ -n "${ALERT_WEBHOOK_URL:-}" ] || exit 0
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d '{"text":"⚠️ sync-prod-to-dev TIMED OUT (over the 5-min target) — liveone-dev may be stale. See GitHub Actions."}' \
            "$ALERT_WEBHOOK_URL" || true
