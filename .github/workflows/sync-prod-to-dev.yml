name: Sync prod → liveone-dev

# Incremental top-up of the shared liveone-dev database from prod (Sydney), every 2h.
# Reads prod with a SELECT-only role; writes only to liveone-dev. Between these runs
# (and the occasional manual R2 full restore) liveone-dev tracks prod closely enough
# for local dev + Vercel preview to share it. See scripts/utils/sync-prod-to-dev-db.ts
# and scripts/utils/rebuild-dev-kv-from-db.ts (the two legs), or docs/sync-prod-to-dev.md.

on:
  schedule:
    - cron: "20 */2 * * *" # every 2h at :20, off the top-of-hour cron rush
  workflow_dispatch: {} # manual "bring up to date" button

concurrency:
  group: sync-prod-to-dev
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pg client 17
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          # psql must match the 17.10 server; pg_wrapper otherwise picks the runner's PG16.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Sync prod → liveone-dev
        env:
          PG_PROD_RO_DATABASE_URL: ${{ secrets.PG_PROD_RO_DATABASE_URL }}
          LIVEONE_DEV_DATABASE_URL: ${{ secrets.LIVEONE_DEV_DATABASE_URL }}
          PLANETSCALE_PROD_BRANCH_ID: ${{ secrets.PLANETSCALE_PROD_BRANCH_ID }}
        run: npm run db:sync-dev-db

      # Dev/preview use a SEPARATE Clerk instance, so your dev login has a different clerk_user_id
      # than prod. The sync copies prod-owned rows, so re-own them to your dev id — DEV_OWNER_REMAP
      # secret = "prodId:devId" — so your dev login sees the same areas/dashboards as prod. No-op if
      # the secret is unset; non-fatal (continue-on-error) so it never blocks the data sync.
      - name: Re-own dev data to the dev login
        continue-on-error: true
        env:
          LIVEONE_DEV_DATABASE_URL: ${{ secrets.LIVEONE_DEV_DATABASE_URL }}
          DEV_OWNER_REMAP: ${{ secrets.DEV_OWNER_REMAP }}
          PLANETSCALE_PROD_BRANCH_ID: ${{ secrets.PLANETSCALE_PROD_BRANCH_ID }}
        run: npm run db:reown-dev

      # Crons are off in dev/preview, so nothing fills the dev: KV namespace organically.
      # Rebuild it from the DB we just topped up, so preview "live" cards stay consistent with
      # the synced data. No prod KV access needed — derived purely from liveone-dev.
      # getEnvironment() resolves to "dev" here (no VERCEL_ENV), so writes land in dev:.
      - name: Rebuild dev KV from liveone-dev
        env:
          PLANETSCALE_DATABASE_URL: ${{ secrets.LIVEONE_DEV_DATABASE_URL }}
          PLANETSCALE_PROD_BRANCH_ID: ${{ secrets.PLANETSCALE_PROD_BRANCH_ID }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: npm run db:rebuild-dev-kv

      - name: Alert on failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.OBSERVATIONS_ALERT_WEBHOOK_URL }}
        run: |
          [ -n "$ALERT_WEBHOOK_URL" ] || exit 0
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d '{"text":"🔴 sync-prod-to-dev FAILED — liveone-dev may be stale. See GitHub Actions."}' \
            "$ALERT_WEBHOOK_URL" || true
