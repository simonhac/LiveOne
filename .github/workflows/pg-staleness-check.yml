name: liveone PG staleness check

# Hourly: assert a fresh 2hourly backup landed in R2, and self-heal a missed tick by re-triggering
# pg-backup.yml (GitHub Actions cron is best-effort). Complements the backup's dead-man's-switch ping.
# Via the reusable the-gitfather workflow.

on:
  schedule:
    - cron: "20 * * * *" # twice hourly, off the top of the hour, so one dropped
    - cron: "50 * * * *" # scheduler tick doesn't blind the watchdog for an hour+
  workflow_dispatch: {}

concurrency:
  group: pg-staleness-check
  cancel-in-progress: false

jobs:
  check:
    permissions:
      actions: write   # lets the self-heal call `gh workflow run pg-backup.yml`
      contents: read
    uses: simonhac/the-gitfather/.github/workflows/pg-staleness-check.yml@main
    with:
      profile: pg-backup/liveone.yaml   # self-heal target is the profile's staleness.heal-workflow
      r2_bucket: ${{ vars.R2_BUCKET }}
      slack_channel: ${{ vars.SLACK_CHANNEL }}
    secrets:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}              # optional
      # ALERT_WEBHOOK_URL intentionally NOT passed — the Slack bot covers this channel (no duplicate alerts).
